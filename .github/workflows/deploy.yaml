name: Build and Update GitOps Repo

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: test-app
  REGISTRY_ID: ${{ secrets.CR_REGISTRY_ID }} 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: app-repo 

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PASSWORD }}

      # 2. Сборка образа с нужным тегом и LABEL
      - name: Build and push Docker image
        id: docker_build
        working-directory: ./app-repo
        run: |
          VERSION_TAG=${GITHUB_REF#refs/tags/}
          
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:$VERSION_TAG"
          
          # Собираем образ и добавляем к нему встроенный label с версией
          docker build \
            --label "version=$VERSION_TAG" \
            -t $IMAGE_URL .
            
          docker push $IMAGE_URL
          
          echo "IMAGE_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/3-gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      # 3. Деплой (обновление манифеста)
      - name: Update manifest and commit
        working-directory: ./gitops-repo/manifests/test-app
        run: |
          # Меняем старый тег в манифесте на наш новый (v1.0.0)
          sed -i "s|image: cr.yandex/.*/test-app:.*|image: ${{ env.IMAGE_URL }}|g" deployment.yaml
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add deployment.yaml
          if git diff-index --quiet HEAD; then
            echo "No changes in deployment.yaml. Skipping commit."
          else
            git commit -m "Deploy version ${{ env.IMAGE_TAG }}"
            git push origin main
          fi
