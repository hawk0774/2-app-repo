name: Build and Update GitOps Repo

on:
  push:
    branches:
      - main 

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: test-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: app-repo

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }} 
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PASSWORD }}

      # 3. Собираем образ. Используем секрет для формирования URL
      - name: Build and push Docker image
        id: docker_build
        run: |
          cd app-repo
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          IMAGE_URL="${{ env.REGISTRY }}/${{ secrets.CR_REGISTRY_ID }}/${{ env.IMAGE_NAME }}:$COMMIT_SHA"
          
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL
          
          echo "IMAGE_TAG=$COMMIT_SHA" >> $GITHUB_ENV
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/3-gitops-repo 
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      # 5. Меняем версию в манифесте
      - name: Update manifest and commit
        run: |
          cd gitops-repo/manifests/test-app
          
          # Заменяем старый образ на новый и готово
          sed -i "s|image: cr.yandex/.*/test-app:.*|image: ${{ env.IMAGE_URL }}|g" deployment.yaml
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add deployment.yaml
          
          if git diff-index --quiet HEAD; then
            echo "No changes in deployment.yaml. Skipping commit."
          else
            git commit -m "Update test-app image tag to ${{ env.IMAGE_TAG }}"
            git push origin main
          fi
